<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Radar des Balises Bluetooth</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #121a2b;
      --panel-2: #18233a;
      --text: #eaf1ff;
      --muted: #9fb0d0;
      --line: #28334d;
      --accent: #4f8cff;
      --ok: #1fbf75;
      --warn: #ffb020;
      --danger: #ff5d73;
      --shadow: 0 12px 28px rgba(0,0,0,.28);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: linear-gradient(180deg, #0a1020 0%, #0d1326 100%);
      color: var(--text);
    }

    .wrap {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .title h1 {
      margin: 0;
      font-size: 32px;
    }

    .title p {
      margin: 8px 0 0;
      color: var(--muted);
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      font-weight: 700;
      cursor: pointer;
      color: white;
      background: var(--accent);
      box-shadow: var(--shadow);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn.secondary {
      background: #24314f;
      border: 1px solid var(--line);
      box-shadow: none;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 22px;
    }

    .card {
      background: rgba(18,26,43,.96);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .stat {
      padding: 18px;
    }

    .stat .label {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 8px;
    }

    .stat .value {
      font-size: 28px;
      font-weight: 800;
    }

    .panel-header {
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .panel-header h2 {
      margin: 0;
      font-size: 18px;
    }

    .panel-header .sub {
      color: var(--muted);
      font-size: 13px;
      margin-top: 4px;
    }

    .panel-body {
      padding: 18px;
    }

    .error {
      margin-bottom: 16px;
      padding: 14px 16px;
      border-radius: 14px;
      background: rgba(255,93,115,.12);
      color: #ffd4db;
      border: 1px solid rgba(255,93,115,.25);
      display: none;
    }

    .list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    .beacon-card {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #141d31;
      padding: 16px;
    }

    .beacon-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .beacon-title strong {
      font-size: 16px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
      border: 1px solid var(--line);
      background: #24314f;
    }

    .chip.ok {
      color: #bff6d8;
      border-color: rgba(31,191,117,.35);
    }

    .chip.warn {
      color: #ffe2a8;
      border-color: rgba(255,176,32,.35);
    }

    .chip.danger {
      color: #ffd4db;
      border-color: rgba(255,93,115,.35);
    }

    .meta {
      display: grid;
      gap: 6px;
      font-size: 13px;
      color: var(--muted);
    }

    .meta .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
      color: #d9e6ff;
      word-break: break-all;
    }

    .empty {
      color: var(--muted);
      text-align: center;
      padding: 30px;
    }

    @media (max-width: 900px) {
      .stats {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="title">
        <h1>🕸️ Radar des Balises Bluetooth</h1>
        <p>Visualisation des balises récemment vues par le système.</p>
      </div>
      <div class="actions">
        <a class="btn secondary" href="/">Accueil</a>
        <a class="btn secondary" href="/admin">Administration</a>
        <button class="btn" onclick="loadBeacons()">🔄 Actualiser</button>
      </div>
    </div>

    <div id="errorMessage" class="error"></div>

    <div class="stats">
      <div class="card stat">
        <div class="label">Balises détectées</div>
        <div class="value" id="beaconsCount">0</div>
      </div>
      <div class="card stat">
        <div class="label">Signal moyen</div>
        <div class="value" id="avgSignal">-</div>
      </div>
      <div class="card stat">
        <div class="label">Balises reconnues</div>
        <div class="value" id="authorizedCount">0</div>
      </div>
    </div>

    <div class="card">
      <div class="panel-header">
        <div>
          <h2>📡 Balises détectées</h2>
          <div class="sub">Liste des balises récemment vues avec association utilisateur si disponible</div>
        </div>
      </div>
      <div class="panel-body">
        <div id="beaconsList" class="list"></div>
      </div>
    </div>
  </div>

  <script>
    function showError(message) {
      const el = document.getElementById('errorMessage');
      el.style.display = 'block';
      el.textContent = `Erreur de chargement: ${message}`;
    }

    function hideError() {
      const el = document.getElementById('errorMessage');
      el.style.display = 'none';
      el.textContent = '';
    }

    function esc(v) {
      if (v === null || v === undefined) return '-';
      return String(v)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function rssiChip(rssi) {
      if (rssi === null || rssi === undefined) {
        return '<span class="chip">RSSI -</span>';
      }
      if (rssi >= -70) {
        return `<span class="chip ok">${rssi} dBm</span>`;
      }
      if (rssi >= -85) {
        return `<span class="chip warn">${rssi} dBm</span>`;
      }
      return `<span class="chip danger">${rssi} dBm</span>`;
    }

    async function loadBeacons() {
      try {
        hideError();

        const response = await fetch('/api/beacons/recent');
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();
        const beacons = Array.isArray(data) ? data : (data.beacons || []);

        document.getElementById('beaconsCount').textContent = beacons.length;

        const validRssi = beacons
          .map(b => b.last_rssi)
          .filter(v => v !== null && v !== undefined && !Number.isNaN(Number(v)))
          .map(Number);

        if (validRssi.length > 0) {
          const avg = validRssi.reduce((a, b) => a + b, 0) / validRssi.length;
          document.getElementById('avgSignal').textContent = `${avg.toFixed(0)} dBm`;
        } else {
          document.getElementById('avgSignal').textContent = '-';
        }

        const recognized = beacons.filter(b => b.user_id || b.user_name).length;
        document.getElementById('authorizedCount').textContent = recognized;

        const container = document.getElementById('beaconsList');

        if (!beacons.length) {
          container.innerHTML = '<div class="empty">Aucune balise détectée récemment.</div>';
          return;
        }

        container.innerHTML = beacons.map(b => `
          <div class="beacon-card">
            <div class="beacon-title">
              <strong>${esc(b.user_name || 'Balise inconnue')}</strong>
              ${rssiChip(b.last_rssi)}
            </div>
            <div class="meta">
              <div><strong>Dernière vue :</strong> ${esc(b.last_seen)}</div>
              <div><strong>UUID :</strong> <span class="mono">${esc(b.uuid)}</span></div>
              <div><strong>Major :</strong> ${esc(b.major)}</div>
              <div><strong>Minor :</strong> ${esc(b.minor)}</div>
              <div><strong>MAC :</strong> <span class="mono">${esc(b.mac)}</span></div>
              <div><strong>Vues :</strong> ${esc(b.seen_count)}</div>
            </div>
          </div>
        `).join('');
      } catch (err) {
        console.error(err);
        showError(err.message);
      }
    }

    loadBeacons();
    setInterval(loadBeacons, 15000);
  </script>
</body>
</html>
