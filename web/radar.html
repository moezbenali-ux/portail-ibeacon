<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radar — Portail</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c0f;
    --surface: #111418;
    --surface2: #141920;
    --border: #1e2329;
    --border-light: #2a3040;
    --text: #e8eaed;
    --text-muted: #6b7585;
    --text-dim: #3a4455;
    --accent: #4ade80;
    --accent-dim: rgba(74,222,128,0.08);
    --accent-border: rgba(74,222,128,0.2);
    --warn: #fbbf24;
    --warn-dim: rgba(251,191,36,0.08);
    --warn-border: rgba(251,191,36,0.2);
    --danger: #f87171;
    --danger-dim: rgba(248,113,113,0.08);
    --danger-border: rgba(248,113,113,0.2);
    --blue: #60a5fa;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    font-size: 14px;
  }

  /* ── Header ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }

  .logo {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .nav-tabs {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  .nav-tab {
    padding: 6px 16px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-muted);
    text-decoration: none;
    background: transparent;
    transition: all 0.15s;
    border-right: 1px solid var(--border);
  }

  .nav-tab:last-child { border-right: none; }
  .nav-tab:hover { background: var(--surface); color: var(--text); }
  .nav-tab.active { background: var(--surface); color: var(--accent); }

  /* ── Layout ── */
  main { padding: 32px; max-width: 1400px; margin: 0 auto; }

  /* ── Toolbar ── */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    gap: 16px;
    flex-wrap: wrap;
  }

  .toolbar-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .page-title {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .refresh-status {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .refresh-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
  }

  .refresh-dot.paused {
    background: var(--text-dim);
    box-shadow: none;
  }

  .toolbar-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn {
    height: 32px;
    padding: 0 14px;
    border-radius: 5px;
    border: 1px solid var(--border-light);
    background: transparent;
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn:hover { border-color: var(--accent); color: var(--accent); }

  .btn.pause-active {
    border-color: var(--warn-border);
    color: var(--warn);
    background: var(--warn-dim);
  }

  /* ── Sort controls ── */
  .sort-bar {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .sort-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .sort-pill {
    height: 28px;
    padding: 0 10px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .sort-pill:hover { border-color: var(--border-light); color: var(--text); }
  .sort-pill.active { border-color: var(--accent-border); color: var(--accent); background: var(--accent-dim); }

  /* ── Stats ── */
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
  }

  .stat-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .stat-value {
    font-family: var(--mono);
    font-size: 26px;
    font-weight: 500;
    color: var(--text);
  }

  .stat-value.green { color: var(--accent); }
  .stat-value.warn  { color: var(--warn); }

  /* ── Filter ── */
  .filter-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    display: flex;
    gap: 12px;
    align-items: center;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .filter-input {
    flex: 1;
    min-width: 200px;
    background: var(--bg);
    border: 1px solid var(--border-light);
    color: var(--text);
    padding: 7px 12px;
    border-radius: 5px;
    font-family: var(--mono);
    font-size: 12px;
    outline: none;
    transition: border-color 0.15s;
  }

  .filter-input:focus { border-color: var(--accent); }
  .filter-input::placeholder { color: var(--text-dim); }

  .filter-toggle {
    height: 32px;
    padding: 0 12px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-toggle:hover { border-color: var(--border-light); color: var(--text); }
  .filter-toggle.active { border-color: var(--accent-border); color: var(--accent); background: var(--accent-dim); }

  /* ── Table ── */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .table-header {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .table-title {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
  }

  .last-update {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
  }

  table { width: 100%; border-collapse: collapse; }

  thead th {
    padding: 10px 16px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-align: left;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }

  thead th:hover { color: var(--text); }
  thead th.sorted { color: var(--accent); }
  .sort-arrow { margin-left: 4px; opacity: 0.5; }
  thead th.sorted .sort-arrow { opacity: 1; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(255,255,255,0.02); }

  td {
    padding: 11px 16px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-muted);
    vertical-align: middle;
  }

  .td-name {
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
  }

  .td-unknown { color: var(--text-dim); font-style: italic; }

  .rssi-cell {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .rssi-bar-wrap {
    width: 60px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .rssi-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.3s;
  }

  .rssi-ok     { color: var(--accent); }
  .rssi-warn   { color: var(--warn); }
  .rssi-danger { color: var(--danger); }
  .fill-ok     { background: var(--accent); }
  .fill-warn   { background: var(--warn); }
  .fill-danger { background: var(--danger); }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.05em;
  }

  .badge-known {
    background: var(--accent-dim);
    color: var(--accent);
    border: 1px solid var(--accent-border);
  }

  .badge-unknown {
    background: var(--border);
    color: var(--text-dim);
    border: 1px solid var(--border);
  }

  .empty {
    padding: 60px;
    text-align: center;
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 12px;
  }

  @media (max-width: 900px) {
    .stats { grid-template-columns: repeat(2,1fr); }
    main { padding: 16px; }
    header { padding: 0 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    PORTAIL / RADAR
  </div>
  <nav class="nav-tabs">
    <a href="/" class="nav-tab">Accueil</a>
    <a href="/admin" class="nav-tab">Admin</a>
    <a href="/insights" class="nav-tab">Insights</a>
    <a href="/radar.html" class="nav-tab active">Radar</a>
  </nav>
</header>

<main>
  <div class="toolbar">
    <div class="toolbar-left">
      <div class="page-title">Radar balises</div>
      <div class="refresh-status">
        <div class="refresh-dot" id="refreshDot"></div>
        <span id="refreshLabel">Refresh 15s</span>
      </div>
    </div>
    <div class="toolbar-right">
      <div class="sort-bar">
        <span class="sort-label">Tri</span>
        <button class="sort-pill active" id="sortRssi" onclick="setSort('rssi')">RSSI ↓</button>
        <button class="sort-pill" id="sortName" onclick="setSort('name')">Nom</button>
        <button class="sort-pill" id="sortTime" onclick="setSort('time')">Récent</button>
      </div>
      <button class="btn" id="pauseBtn" onclick="togglePause()">⏸ Pause</button>
      <button class="btn" onclick="loadBeacons()">↺ Actualiser</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card">
      <div class="stat-label">Balises détectées</div>
      <div class="stat-value" id="statTotal">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Reconnues</div>
      <div class="stat-value green" id="statKnown">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Inconnues</div>
      <div class="stat-value" id="statUnknown">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Signal moyen</div>
      <div class="stat-value" id="statAvg">—</div>
    </div>
  </div>

  <!-- Filter bar -->
  <div class="filter-bar">
    <input class="filter-input" type="text" id="filterInput"
           placeholder="Filtrer par nom, UUID, MAC, major, minor..."
           oninput="applyFilter()">
    <button class="filter-toggle" id="toggleKnown" onclick="toggleKnown()">Reconnues</button>
    <button class="filter-toggle" id="toggleUnknown" onclick="toggleUnknown()">Inconnues</button>
    <button class="filter-toggle" id="toggleStrong" onclick="toggleStrong()">Signal fort (≥ -70)</button>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <div class="table-header">
      <div class="table-title">BALISES RÉCENTES</div>
      <div class="last-update" id="lastUpdate">—</div>
    </div>
    <div id="tableBody">
      <div class="empty">Chargement...</div>
    </div>
  </div>
</main>

<script>
let allBeacons = [];
let filteredBeacons = [];
let sortMode = 'rssi';
let paused = false;
let intervalId = null;
let showKnown = false;
let showUnknown = false;
let showStrong = false;

// ── Init ──────────────────────────────────────────────────────────────────────
window.onload = () => {
  loadBeacons();
  startInterval();
};

function startInterval() {
  if (intervalId) clearInterval(intervalId);
  intervalId = setInterval(loadBeacons, 15000);
}

function togglePause() {
  paused = !paused;
  const btn = document.getElementById('pauseBtn');
  const dot = document.getElementById('refreshDot');
  const lbl = document.getElementById('refreshLabel');

  if (paused) {
    clearInterval(intervalId);
    btn.textContent = '▶ Reprendre';
    btn.classList.add('pause-active');
    dot.classList.add('paused');
    lbl.textContent = 'Pausé';
  } else {
    startInterval();
    btn.textContent = '⏸ Pause';
    btn.classList.remove('pause-active');
    dot.classList.remove('paused');
    lbl.textContent = 'Refresh 15s';
    loadBeacons();
  }
}

// ── Sort ──────────────────────────────────────────────────────────────────────
function setSort(mode) {
  sortMode = mode;
  document.querySelectorAll('.sort-pill').forEach(p => p.classList.remove('active'));
  document.getElementById('sort' + mode.charAt(0).toUpperCase() + mode.slice(1)).classList.add('active');
  render();
}

function sortBeacons(beacons) {
  return [...beacons].sort((a, b) => {
    if (sortMode === 'rssi') {
      const ra = a.last_rssi ?? -999;
      const rb = b.last_rssi ?? -999;
      return rb - ra; // descendant
    }
    if (sortMode === 'name') {
      const na = (a.user_name || 'zzz').toLowerCase();
      const nb = (b.user_name || 'zzz').toLowerCase();
      return na.localeCompare(nb);
    }
    if (sortMode === 'time') {
      return (b.last_seen || '').localeCompare(a.last_seen || '');
    }
    return 0;
  });
}

// ── Filters ───────────────────────────────────────────────────────────────────
function toggleKnown() {
  showKnown = !showKnown;
  document.getElementById('toggleKnown').classList.toggle('active', showKnown);
  applyFilter();
}

function toggleUnknown() {
  showUnknown = !showUnknown;
  document.getElementById('toggleUnknown').classList.toggle('active', showUnknown);
  applyFilter();
}

function toggleStrong() {
  showStrong = !showStrong;
  document.getElementById('toggleStrong').classList.toggle('active', showStrong);
  applyFilter();
}

function applyFilter() {
  const q = document.getElementById('filterInput').value.toLowerCase().trim();

  filteredBeacons = allBeacons.filter(b => {
    if (showKnown && !b.user_name) return false;
    if (showUnknown && b.user_name) return false;
    if (showStrong && (b.last_rssi == null || b.last_rssi < -70)) return false;

    if (!q) return true;
    return (
      (b.user_name || '').toLowerCase().includes(q) ||
      (b.uuid || '').toLowerCase().includes(q) ||
      (b.mac || '').toLowerCase().includes(q) ||
      String(b.major || '').includes(q) ||
      String(b.minor || '').includes(q)
    );
  });

  render();
}

// ── Load ──────────────────────────────────────────────────────────────────────
async function loadBeacons() {
  try {
    const r = await fetch('/api/beacons/recent');
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    allBeacons = Array.isArray(data) ? data : (data.beacons || []);

    // Stats
    const known = allBeacons.filter(b => b.user_name).length;
    const rssis = allBeacons.map(b => b.last_rssi).filter(v => v != null);
    const avg = rssis.length ? (rssis.reduce((a,b) => a+b, 0) / rssis.length).toFixed(0) : '—';

    document.getElementById('statTotal').textContent = allBeacons.length;
    document.getElementById('statKnown').textContent = known;
    document.getElementById('statUnknown').textContent = allBeacons.length - known;
    document.getElementById('statAvg').textContent = avg !== '—' ? avg + ' dBm' : '—';
    document.getElementById('lastUpdate').textContent = 'Mis à jour ' + new Date().toLocaleTimeString('fr-FR');

    applyFilter();
  } catch(e) {
    console.error(e);
  }
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const sorted = sortBeacons(filteredBeacons);
  const body = document.getElementById('tableBody');

  if (!sorted.length) {
    body.innerHTML = '<div class="empty">Aucune balise trouvée</div>';
    return;
  }

  const sa = col => col === sortMode ? ' sorted' : '';
  const arrow = col => `<span class="sort-arrow">${col === sortMode ? '↓' : '↕'}</span>`;

  let html = `<table>
    <thead>
      <tr>
        <th onclick="setSort('name')" class="${sa('name')}">Nom${arrow('name')}</th>
        <th>Statut</th>
        <th onclick="setSort('rssi')" class="${sa('rssi')}">RSSI${arrow('rssi')}</th>
        <th>UUID</th>
        <th>Major</th>
        <th>Minor</th>
        <th>MAC</th>
        <th>Vues</th>
        <th onclick="setSort('time')" class="${sa('time')}">Dernière vue${arrow('time')}</th>
      </tr>
    </thead>
    <tbody>`;

  sorted.forEach(b => {
    const rssi = b.last_rssi;
    const rssiClass = rssi == null ? '' : rssi >= -70 ? 'rssi-ok' : rssi >= -85 ? 'rssi-warn' : 'rssi-danger';
    const fillClass = rssi == null ? '' : rssi >= -70 ? 'fill-ok' : rssi >= -85 ? 'fill-warn' : 'fill-danger';
    const pct = rssi == null ? 0 : Math.min(100, Math.max(0, (rssi + 100) / 60 * 100));
    const rssiStr = rssi != null ? `${rssi} dBm` : '—';

    const name = b.user_name
      ? `<span class="td-name">${esc(b.user_name)}</span>`
      : `<span class="td-name td-unknown">Inconnue</span>`;

    const badge = b.user_name
      ? `<span class="badge badge-known">Reconnue</span>`
      : `<span class="badge badge-unknown">Inconnue</span>`;

    html += `<tr>
      <td>${name}</td>
      <td>${badge}</td>
      <td>
        <div class="rssi-cell">
          <span class="${rssiClass}">${rssiStr}</span>
          <div class="rssi-bar-wrap">
            <div class="rssi-bar-fill ${fillClass}" style="width:${pct}%"></div>
          </div>
        </div>
      </td>
      <td style="max-width:140px;overflow:hidden;text-overflow:ellipsis">${esc(b.uuid)}</td>
      <td>${esc(b.major)}</td>
      <td>${esc(b.minor)}</td>
      <td>${esc(b.mac)}</td>
      <td>${esc(b.seen_count)}</td>
      <td>${esc(b.last_seen)}</td>
    </tr>`;
  });

  html += '</tbody></table>';
  body.innerHTML = html;
}

function esc(v) {
  if (v == null) return '<span style="color:var(--text-dim)">—</span>';
  return String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
