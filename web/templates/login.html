<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portail — Accès</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #07080a;
    --surface: #0d0f12;
    --border: #161a1f;
    --border-light: #1e2530;
    --text: #dde2ea;
    --text-muted: #556070;
    --accent: #00e5a0;
    --accent-glow: rgba(0,229,160,0.15);
    --accent-dim: rgba(0,229,160,0.06);
    --error: #ff4d6a;
    --error-dim: rgba(255,77,106,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* ── Grid background ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* ── Glow orb ── */
  body::after {
    content: '';
    position: fixed;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,229,160,0.04) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  /* ── Card ── */
  .card {
    position: relative;
    width: 380px;
    background: var(--surface);
    border: 1px solid var(--border-light);
    border-radius: 12px;
    padding: 48px 40px 40px;
    animation: fadeIn 0.4s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Corner accents ── */
  .card::before, .card::after {
    content: '';
    position: absolute;
    width: 16px; height: 16px;
  }
  .card::before {
    top: -1px; left: -1px;
    border-top: 2px solid var(--accent);
    border-left: 2px solid var(--accent);
    border-radius: 12px 0 0 0;
  }
  .card::after {
    bottom: -1px; right: -1px;
    border-bottom: 2px solid var(--accent);
    border-right: 2px solid var(--accent);
    border-radius: 0 0 12px 0;
  }

  /* ── Header ── */
  .card-header {
    margin-bottom: 36px;
  }

  .logo-mark {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
  }

  .logo-icon {
    width: 32px; height: 32px;
    border: 1px solid var(--accent);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--accent-dim);
  }

  .logo-icon svg {
    width: 16px; height: 16px;
    stroke: var(--accent);
    fill: none;
    stroke-width: 1.5;
  }

  .logo-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .card-title {
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.02em;
    margin-bottom: 6px;
  }

  .card-subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
  }

  /* ── Form ── */
  .field {
    margin-bottom: 16px;
  }

  .field-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 8px;
    display: block;
  }

  .field-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border-light);
    color: var(--text);
    padding: 11px 14px;
    border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  .field-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }

  .field-input::placeholder { color: var(--border-light); }

  /* ── Error ── */
  .error-msg {
    background: var(--error-dim);
    border: 1px solid rgba(255,77,106,0.2);
    border-radius: 6px;
    padding: 10px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--error);
    margin-bottom: 16px;
    display: none;
    align-items: center;
    gap: 8px;
  }

  .error-msg.show { display: flex; }

  /* ── Button ── */
  .btn-submit {
    width: 100%;
    height: 44px;
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.04em;
    border-radius: 6px;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }

  .btn-submit:hover {
    background: rgba(0,229,160,0.12);
    box-shadow: 0 0 20px var(--accent-glow);
  }

  .btn-submit:active { transform: scale(0.99); }

  .btn-submit.loading {
    pointer-events: none;
    opacity: 0.7;
  }

  .btn-submit.loading::after {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(0,229,160,0.1), transparent);
    animation: shimmer 1s infinite;
  }

  @keyframes shimmer {
    to { left: 100%; }
  }

  /* ── Footer ── */
  .card-footer {
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    text-align: center;
    letter-spacing: 0.06em;
  }
</style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <div class="logo-mark">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>
      <span class="logo-text">Portail / Admin</span>
    </div>
    <div class="card-title">Accès restreint</div>
    <div class="card-subtitle">Authentification requise</div>
  </div>

  <div class="error-msg" id="errorMsg">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span id="errorText">Identifiants incorrects</span>
  </div>

  <form id="loginForm" onsubmit="handleLogin(event)">
    <div class="field">
      <label class="field-label" for="username">Identifiant</label>
      <input class="field-input" type="text" id="username" name="username"
             placeholder="admin" autocomplete="username" required>
    </div>

    <div class="field">
      <label class="field-label" for="password">Mot de passe</label>
      <input class="field-input" type="password" id="password" name="password"
             placeholder="••••••••" autocomplete="current-password" required>
    </div>

    <button class="btn-submit" type="submit" id="submitBtn">
      Connexion
    </button>
  </form>

  <div class="card-footer">
    park.roole.fr &nbsp;·&nbsp; Système de contrôle d'accès
  </div>
</div>

<script>
async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const err = document.getElementById('errorMsg');

  btn.classList.add('loading');
  btn.textContent = 'Vérification...';
  err.classList.remove('show');

  const formData = new FormData();
  formData.append('username', document.getElementById('username').value);
  formData.append('password', document.getElementById('password').value);

  try {
    const r = await fetch('/login', { method: 'POST', body: formData });
    const data = await r.json();

    if (data.ok) {
      btn.textContent = '✓ Connecté';
      setTimeout(() => {
        window.location.href = data.redirect || '/admin';
      }, 400);
    } else {
      err.classList.add('show');
      document.getElementById('errorText').textContent = data.error || 'Identifiants incorrects';
      btn.classList.remove('loading');
      btn.textContent = 'Connexion';
      document.getElementById('password').value = '';
      document.getElementById('password').focus();
    }
  } catch(e) {
    err.classList.add('show');
    document.getElementById('errorText').textContent = 'Erreur réseau';
    btn.classList.remove('loading');
    btn.textContent = 'Connexion';
  }
}
</script>

</body>
</html>
